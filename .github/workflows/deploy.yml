name: Deploy to Nomad

on:
  workflow_run:
    workflows: ["Build and Push"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy Job to Nomad
        env:
          NOMAD_ADDR: http://192.168.1.17:4646
        run: |
          nomad job run \
            -var="image=registry.matteo-humez.fr/portfolio:${{ github.event.workflow_run.head_sha }}" \
            -var="registry_user=${{ secrets.REGISTRY_USERNAME }}" \
            -var="registry_password=${{ secrets.REGISTRY_PASSWORD }}" \
            portfolio.nomad