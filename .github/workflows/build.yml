name: Build and Push

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."192.168.1.16:5000"]
              http = true
              insecure = true

      - name: Login to Private Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login 192.168.1.16:5000 \
            -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            192.168.1.16:5000/portfolio:latest
            192.168.1.16:5000/portfolio:${{ github.sha }}
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=local,src=/tmp/buildkit-cache
          cache-to: type=local,dest=/tmp/buildkit-cache,mode=max